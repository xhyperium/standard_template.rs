name: 功能建议
description: 提议新功能或改进
title: "[功能] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 这个功能要解决什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的解决方案是什么？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他方案或变通做法。

  - type: textarea
    id: context
    attributes:
      label: 其他信息
      description: 相关参考、截图或其他上下文。
