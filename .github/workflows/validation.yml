name: 校验

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  utf8-encoding:
    name: UTF-8 编码门禁
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 编码扫描
        run: |
          bad=0
          while IFS= read -r -d '' f; do
            enc=$(file -b --mime-encoding "$f")
            case "$enc" in
              *utf-8*|*ascii*|*us-ascii*) ;;
              *binary*) ;;
              *) echo "❌ $f → $enc"; bad=$((bad+1)) ;;
            esac
          done < <(find . -type f -not -path './.git/*' -not -path './node_modules/*' -not -path './.cargo/*' -not -path './target/*' -not -name '*.png' -not -name '*.jpg' -not -name '*.ico' -not -name '*.svg' -not -name '*.woff*' -not -name '*.lock' -print0)
          [ "$bad" -gt 0 ] && echo "❌ $bad 个非 UTF-8 文件" && exit 1
          echo "✅ UTF-8 / ASCII"
      - name: U+FFFD 残留
        run: |
          residue=0
          while IFS= read -r -d '' f; do
            if grep -qP 'ï¿½' "$f" 2>/dev/null; then echo "⚠️ $f — 含 U+FFFD"; residue=$((residue+1)); fi
          done < <(find . -type f -not -path './.git/*' -not -path './node_modules/*' -not -path './.cargo/*' -not -path './target/*' -not -name '*.png' -not -name '*.jpg' -not -name '*.ico' -not -name '*.svg' -not -name '*.woff*' -not -name '*.lock' -not -name '*.bin' -not -name '*.db' -print0)
          [ "$residue" -gt 0 ] && echo "⚠️ $residue 个文件含 U+FFFD"
