# starship.toml — standard_template Starship 提示配置
#
# 使用方式:
#   ln -s $PWD/starship.toml ~/.config/starship.toml
#   或: export STARSHIP_CONFIG=/path/to/standard_template.rs/starship.toml

# ── 显示顺序 ──────────────────────────────

format = """
$custom\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character\
"""

# ── Worktree 状态 (自定义模块) ────────────

[custom.wt]
description = "standard_template Git Worktree 状态"
command = "node scripts/shell/starship-wt.mjs"
when = "node scripts/shell/starship-wt.mjs"
format = "[$symbol$output]($style)"
style = "bold cyan"
symbol = "⛓️ "
